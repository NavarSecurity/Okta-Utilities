[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "okta-trusted-origin-manager"
version = "1.0.0"
description = "Export, compare, validate, and import Okta Trusted Origins."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "requests>=2.31.0",
  "python-dotenv>=1.0.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0"
]

[project.scripts]
okta-trusted-origin-manager = "okta_trusted_origin_manager.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
