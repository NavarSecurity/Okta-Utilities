[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "okta-profile-mapping-exporter"
version = "1.0.0"
description = "Export Okta profile mappings and attribute-level mapping details."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "requests>=2.31.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0"
]

[project.scripts]
okta-profile-mapping-exporter = "okta_profile_mapping_exporter.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
