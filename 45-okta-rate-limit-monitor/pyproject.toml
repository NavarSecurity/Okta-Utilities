[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "okta-rate-limit-monitor"
version = "1.0.0"
description = "Monitor Okta API rate-limit risk using response headers, System Log events, and planned request estimates."
requires-python = ">=3.10"
dependencies = [
  "requests>=2.31.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4.0"
]

[project.scripts]
okta-rate-limit-monitor = "okta_rate_limit_monitor.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
