[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "okta-idp-create"
version = "0.1.0"
description = "Create external SAML and OIDC Identity Providers in Okta from reviewed JSON configuration files."
requires-python = ">=3.10"
dependencies = [
  "requests>=2.31.0",
  "python-dotenv>=1.0.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0"
]

[project.scripts]
okta-idp-create = "okta_idp_create.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
